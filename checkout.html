<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Agrobaz</title>
    <meta name="description" content="Checkout flow for Agrobaz marketplace orders." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="subpage-header">
      <nav class="topbar">
        <a class="brand" href="../index.html">
          <img src="../images/agrobaz-logo.svg" alt="Agrobaz Market" class="logo">
        </a>
        <div class="nav-links">
          <a href="marketplace.html">Marketplace</a>
          <a href="checkout.html">Checkout</a>
          <a href="signin.html">Sign in</a>
        </div>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-banner">
        <p class="eyebrow">Checkout</p>
        <h1>Complete your order</h1>
      </section>

      <section class="checkout-grid">
        <div class="content-card">
          <h3>Shipping details</h3>
          <div class="form-grid">
            <div class="field">
              <label>Full name</label>
              <input type="text" placeholder="Your name" />
            </div>
            <div class="field">
              <label>Address</label>
              <input type="text" placeholder="Street address" />
            </div>
            <div class="field">
              <label>Payment method</label>
              <select>
                <option>Card</option>
                <option>Bank transfer</option>
                <option>Mobile money</option>
              </select>
            </div>
          </div>
        </div>

        <div class="summary-card">
          <h3>Order summary</h3>
          <p>Premium maize grain × 2</p>
          <p>Shipping: $15</p>
          <p>Total: $375</p>
          <a class="btn btn-primary" href="signin.html">Place order</a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© <span id="year"></span> Agrobaz Market</p>
    </footer>

    <script src="../script.js"></script>
  </body>
</html>
